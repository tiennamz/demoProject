<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/register.css">
    <title>Register</title>
</head>
<body>
    <form class="form-register">
        <h1>Đăng ký tài khoản</h1>
        <div >
            <label for="fullname">Họ và tên <span>*</span></label>
            <input type="text" name="fullname" id="fullname">
            <small class="validate" id="valid-fullname"></small>
        </div>
        <div >
            <label for="email">Email <span>*</span></label>
            <input type="email" name="email" id="email">
            <small class="validate" id="valid-email"></small>
        </div>
        <div >
            <label for="password">Mật khẩu <span>*</span></label>
            <input type="password" name="password" id="password">
            <small class="validate" id="valid-password"></small>
        </div>
        <div >
            <label for="re-password">Xác nhận mật khẩu <span>*</span></label>
            <input type="password" name="re-password" id="re-password">
            <small class="validate" id="valid-re-password"></small>
        </div>
        <button id="btn-register" type="submit">Đăng ký</button>
        <p>Đã có tài khoản? <a href="./login.html">Đăng nhập ngay</a></p>
    </form>

    <script src="../javaScript/register.js"></script>
</body>
</html>
