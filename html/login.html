<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <title>Log-in</title>
</head>
<body>
    <form>
        <h1>Đăng nhập</h1>
        <div class="input">
            <label>Email</label>
            <input type="text" id="email-inp">
            <small class="validate" id="valid-email"></small>
        </div>
        <div class="input">
            <label>Mật khẩu</label>
            <div class="pass">
                <input id="inp-password" type="password">
                <input id="appear" type="checkbox" onclick="document.getElementById('inp-password').type = this.checked ? 'text' : 'password' ">
            </div>
            <small class="validate" id="valid-password"></small>

        </div>
        <button type="submit" id="btn-login" class="btn-login">Đăng nhập</button>
        <p>Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a></p>
    </form>
    <script src="../javaScript/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
