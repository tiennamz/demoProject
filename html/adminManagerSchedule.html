<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/adminManagerSchedule.css">
    <title>Admin Manager Schedule</title>
</head>
<body>
    <section class="menu">
        <h3>Admin Dashboard</h3>
        <div class="list-link">
            <nav class="choice-admin"><a class="link-current" id="link-manager-schedule" href="./adminManagerSchedule.html">Quản lý lịch</a></nav>
            <nav class="choice-admin"><a href="./adminManagerService.html">Quản lý dịch vụ</a></nav>
            <nav class="choice-admin"><a href="./home.html">Trang chủ</a></nav>
            <nav id="log-out" class="logout choice-admin"><a href="./login.html">Đăng xuất</a></nav>
        </div>
    </section>
    <main>
        <h2>Thống kê lịch tập</h2>
        <div id="num-of-schedule" class="num-of-schedule">
             
        </div>
        <div class="chart">
            <canvas width="500" height="200" id="chart-schudule"></canvas>
        </div>
        <div class="filter">
            <form>
                <h3>Bộ lọc</h3>
                <div class="form">
                    <div class="filter-input">
                        <label for="filter-class">Lớp học</label>
                        <select name="filter-class" id="filter-class">
                            
                        </select>
                    </div>
                    <div class="filter-input">
                        <label for="filter-email">Email</label>
                        <input type="email" name="filter-email" id="filter-email" placeholder="Tìm theo email">
                    </div>
                    <div class="filter-input">
                        <label for="filter-date">Ngày</label>
                        <input type="date" name="filter-date" id="filter-date">
                    </div>
                </div>
            </form>

            <table border="0" cellspacing="0" >
            <thead>
                <tr>
                    <th>Lớp học</th>
                    <th>Ngày tập</th>
                    <th>Khung giờ</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody class="list-schedule" id="list-schedule">

            </tbody>
            </table>
        </div>
    </main>
    <form id="form-add-schedule" class="hidden form-add-schedule">
            <h4 id="title-form" class="title-form">Chỉnh sửa lịch của người dùng</h4>
            <div class="input-schedule">
                <label for="class-schedule">Lớp học</label>
                <select name="class-schedule" id="class-schedule">
                    <option value="">Chọn lớp học</option>
                    <option value="1">Gym</option>
                    <option value="2">Yoga</option>
                    <option value="3">Zumba</option>
                </select>
                <small class="valid" id="valid-class"></small>

            </div>
            <div class="input-schedule">
                <label for="date-schedule">Ngày tập</label>
                <input type="date" id="date-schedule">
                <small class="valid" id="valid-date"></small>

            </div>
            <div class="input-schedule">
                <label for="time-schedule">Khung giờ</label>
                <select name="time-schedule" id="time-schedule">
                    <option value="">Chọn khung giờ</option>
                    <option value="7:00-9:00">7:00-9:00</option>
                    <option value="9:00-11:00">9:00-11:00</option>
                    <option value="13:00-15:00">13:00-15:00</option>
                    <option value="15:00-17:00">15:00-17:00</option>
                    <option value="17:00-19:00">17:00-19:00</option>
                </select>
                <small class="valid" id="valid-time"></small>
            </div>
            <div class="action">
                <button type="reset" id="cancel-update" class="cancel">Hủy</button>
                <button  type="submit" id="confirm-edit" class="confirm-edit">Sửa</button>
            </div>
        </form>
                <div class="hidden modal-box" id="modal-box">
                    <h2 class="modal-title">Xác nhận xóa</h2>
                    <p class="confirm-message">Bạn có chắc chắn muốn xóa lịch tập này không?</p>

                    <div class="modal-footer">
                        <button class="btn btn-gray" id="closeDeleteModal">Hủy bỏ</button>
                        <button class="btn btn-red" id="yesDelete">Đồng ý xóa</button>
                    </div>
                </div>

    <div id="overlay" class="overlay hidden"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../javaScript/adminManagerSchedule.js"></script>
</body>
</html>
