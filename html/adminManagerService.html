<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/adminManagerService.css">
    <title>Admin Manager Service</title>
</head>
<body>
    <section class="menu">
        <h3>Admin Dashboard</h3>
        <div class="list-link">
            <nav class="choice-admin"><a href="./adminManagerSchedule.html">Quản lý lịch</a></nav>
            <nav class="choice-admin"><a id="link-manager-service" href="./adminManagerService.html">Quản lý dịch vụ</a></nav>
            <nav class="choice-admin"><a href="./home.html">Trang chủ</a></nav>
            <nav id="log-out" class="logout choice-admin"><a href="./login.html">Đăng xuất</a></nav>
        </div>
    </section>
    <main>
        <div class="title">
            <h2>Quản lý Dịch vụ</h2>
            <button id="btn-add-new-service" class="btn-add-new-service">Thêm dịch vụ mới</button>
        </div>
        <table cellspacing="0">
            <thead>
                <tr>
                    <td>Tên dịch vụ</td>
                    <td class="describe">Mô tả</td>
                    <td>Hình ảnh</td>
                    <td>Thao tác</td>
                </tr>
            </thead>
            <tbody id="list-class">

            </tbody>
        </table>
    </main>
    <form id="popup-add-service" class="hidden popup-add-service">
        <h3 id="title-form" class="title-form">Thêm dịch vụ mới</h3>
        <div class="input-add">
            <label for="input-name-of-service">Tên dịch vụ</label>
            <input type="text" name="input-name-of-service" id="input-name-of-service">
            <small id="validate-name" class="valid"></small>
        </div>
        <div class="input-add">
            <label for="describe-service">Mô tả</label>
            <textarea rows="4" name="input-describe-service" id="input-describe-service"></textarea>
            <small id="validate-describe" class="valid"></small>

        </div>
        <div class="input-add">
            <label for="img-service">URL Hình ảnh</label>
            <input type="text" name="input-img-service" id="input-img-service">
            <small id="validate-img" class="valid"></small>

        </div>
        <div class="btn-action-service">
            <button id="btn-cancel" class="btn-cancel">Hủy</button>
            <button id="btn-add-service" class="btn-add-service">Lưu</button>
            <button hidden id="btn-confirm-edit-service" class="btn-confirm-edit-service">Sửa</button>
        </div>
    </form>
    <div id="popup-delete-service" class="hidden popup-delete-service">
        <h3>Xác nhận xóa</h3>
        <p>Bạn có chắc muốn xóa dịch vụ này</p>
        <div class="btn-action-delete-service">
            <button id="btn-cancel-delete-service" class="btn-cancel-delete-service">Hủy</button>
            <button id="btn-confirm-delete-service" class="btn-confirm-delete-service">Xóa</button>
        </div>
    </div>
    <div id="overlay" class="hidden overlay"></div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../javaScript/adminManagerService.js"></script>
</body>
</html>
